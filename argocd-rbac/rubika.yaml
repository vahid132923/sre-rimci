apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rubika
  namespace: argocd
  # Finalizer that ensures that project is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project description
  description: rubika Project

  # Allow manifests to deploy from any Git repos
  sourceRepos:
  - '*'

  # Only permit applications to deploy to the 'guestbook' namespace or any namespace starting with 'guestbook-' in the same cluster
  # Destination clusters can be identified by 'server', 'name', or both.
  destinations:
  - namespace: '*'
    server: https://lbdev.rimci.dev:6443
    name: dev-cluster
  - namespace: '*'
    server: https://lbprod.rimci.dev:6443
    name: prod-cluster  
  - namespace: '*'
    server: https://lbstage.rimci.dev:6443
    name: stage-cluster  
  - namespace: '*'
    server: https://kubernetes.default.svc
    name: tools-cluster      

  # Deny all cluster-scoped resources from being created, except for Namespace
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace


  # Enables namespace orphaned resource monitoring.
  orphanedResources:
    warn: false

  roles:
  # A role which provides read-only access to all applications in the project
  - name: rubika-read-only
    description: Read-only privileges to rubika
    policies:
    - p, proj:rubika:rubika-read-only, applications, get, rubika/*, allow
    groups:
    - rubika-read-only

  - name: rubika-dev-read-only
    description: Read-only privileges to rubika
    policies:
    - p, proj:rubika:rubika-dev-read-only, applications, get, rubika-dev/*, allow
    groups:
    - rubika-dev-read-only

  - name: rubika-stage-read-only
    description: Read-only privileges to rubika
    policies:
    - p, proj:rubika:rubika-stage-read-only, applications, get, rubika-stage/*, allow
    groups:
    - rubika-stage-read-only

  - name: rubika-prod-read-only
    description: Read-only privileges to rubika
    policies:
    - p, proj:rubika:rubika-prod-read-only, applications, get, rubika-prod/*, allow
    groups:
    - rubika-prod-read-only  


  # A role which provides editor access to all applications in the project
  - name: rubika-editor
    description: editor privileges to rubika
    policies:
    - p, proj:rubika:rubika-editor, applications, get, rubika/*, allow
    - p, proj:rubika:rubika-editor, applications, update, rubika/*, allow
    - p, proj:rubika:rubika-editor, applications, sync, rubika/*, allow
    - p, proj:rubika:rubika-editor, exec, create, rubika/*, allow
    - p, proj:rubika:rubika-editor, logs, get, rubika/*, allow  
    groups:
    - rubika-editor

  - name: rubika-dev-editor
    description: editor privileges to rubika
    policies:
    - p, proj:rubika:rubika-dev-editor, applications, get, rubika-dev/*, allow
    - p, proj:rubika:rubika-dev-editor, applications, update, rubika-dev/*, allow
    - p, proj:rubika:rubika-dev-editor, applications, sync, rubika-dev/*, allow
    - p, proj:rubika:rubika-dev-editor, exec, create, rubika-dev/*, allow   
    - p, proj:rubika:rubika-dev-editor, logs, get, rubika-dev/*, allow  
    groups:
    - rubika-dev-editor

  - name: rubika-stage-editor
    description: editor privileges to rubika
    policies:
    - p, proj:rubika:rubika-stage-editor, applications, get, rubika-stage/*, allow
    - p, proj:rubika:rubika-stage-editor, applications, update, rubika-stage/*, allow
    - p, proj:rubika:rubika-stage-editor, applications, sync, rubika-stage/*, allow
    - p, proj:rubika:rubika-stage-editor, exec, create, rubika-stage/*, allow    
    - p, proj:rubika:rubika-stage-editor, logs, get, rubika-stage/*, allow  
    groups:
    - rubika-stage-editor

  - name: rubika-prod-editor
    description: editor privileges to rubika
    policies:
    - p, proj:rubika:rubika-prod-editor, applications, get, rubika-prod/*, allow
    - p, proj:rubika:rubika-prod-editor, applications, update, rubika-prod/*, allow
    - p, proj:rubika:rubika-prod-editor, applications, sync, rubika-prod/*, allow
    - p, proj:rubika:rubika-prod-editor, exec, create, rubika-prod/*, allow  
    - p, proj:rubika:rubika-prod-editor, logs, get, rubika-prod/*, allow  
      
    groups:
    - rubika-prod-editor    


  # A role which provides admin access to all applications in the project
  - name: rubika-admin
    description: admin privileges to rubika
    policies:
    - p, proj:rubika:rubika-admin, applications, *, rubika/*, allow
    - p, proj:rubika:rubika-admin, applications, *, rubika/*, allow
    - p, proj:rubika:rubika-admin, exec, create, rubika/*, allow
    - p, proj:rubika:rubika-admin, logs, get, rubika/*, allow    
    - p, proj:rubika:rubika-admin, applications, delete, rubika/*, deny
    - p, proj:rubika:rubika-admin, applications, create, rubika/*, deny
    groups:
    - rubika-admin

  - name: rubika-dev-admin
    description: admin privileges to rubika
    policies:
    - p, proj:rubika:rubika-dev-admin, applications, *, rubika-dev/*, allow
    - p, proj:rubika:rubika-dev-admin, exec, create, rubika-dev/*, allow
    - p, proj:rubika:rubika-dev-admin, logs, get, rubika-dev/*, allow    
    - p, proj:rubika:rubika-dev-admin, applications, delete, rubika-dev/*, deny
    - p, proj:rubika:rubika-dev-admin, applications, create, rubika-dev/*, deny
    groups:
    - rubika-dev-admin

  - name: rubika-stage-admin
    description: admin privileges to rubika
    policies:
    - p, proj:rubika:rubika-stage-admin, applications, *, rubika-stage/*, allow
    - p, proj:rubika:rubika-stage-admin, exec, create, rubika-stage/*, allow
    - p, proj:rubika:rubika-stage-admin, logs, get, rubika-stage/*, allow    
    - p, proj:rubika:rubika-stage-admin, applications, delete, rubika-stage/*, deny
    - p, proj:rubika:rubika-stage-admin, applications, create, rubika-stage/*, deny
    groups:
    - rubika-stage-admin  

  - name: rubika-prod-admin
    description: admin privileges to rubika
    policies:
    - p, proj:rubika:rubika-prod-admin, applications, *, rubika-prod/*, allow
    - p, proj:rubika:rubika-prod-admin, exec, create, rubika-prod/*, allow
    - p, proj:rubika:rubika-prod-admin, logs, get, rubika-prod/*, allow    
    - p, proj:rubika:rubika-prod-admin, applications, delete, rubika-prod/*, deny
    - p, proj:rubika:rubika-prod-admin, applications, create, rubika-prod/*, deny
    groups:
    - rubika-prod-admin





  # By default, apps may sync to any cluster specified under the `destinations` field, even if they are not
  # scoped to this project. Set the following field to `true` to restrict apps in this cluster to only clusters
  # scoped to this project.
  permitOnlyProjectScopedClusters: false

  # When using Applications-in-any-namespace, this field determines which namespaces this AppProject permits
  # Applications to reside in. Details: https://argo-cd.readthedocs.io/en/stable/operator-manual/app-any-namespace/
  sourceNamespaces:

  - "argocd-apps-*"
