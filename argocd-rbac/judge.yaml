apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: judge
  namespace: argocd
  # Finalizer that ensures that project is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project description
  description: judge Project

  # Allow manifests to deploy from any Git repos
  sourceRepos:
  - '*'

  # Only permit applications to deploy to the 'guestbook' namespace or any namespace starting with 'guestbook-' in the same cluster
  # Destination clusters can be identified by 'server', 'name', or both.
  destinations:
  - namespace: '*'
    server: https://lbdev.rimci.dev:6443
    name: dev-cluster
  - namespace: '*'
    server: https://lbprod.rimci.dev:6443
    name: prod-cluster  
  - namespace: '*'
    server: https://lbstage.rimci.dev:6443
    name: stage-cluster  
  - namespace: '*'
    server: https://kubernetes.default.svc
    name: tools-cluster      

  # Deny all cluster-scoped resources from being created, except for Namespace
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace


  # Enables namespace orphaned resource monitoring.
  orphanedResources:
    warn: false

  roles:
  # A role which provides read-only access to all applications in the project
  - name: judge-read-only
    description: Read-only privileges to judge
    policies:
    - p, proj:judge:judge-read-only, applications, get, judge/*, allow
    groups:
    - judge-read-only

  - name: judge-dev-read-only
    description: Read-only privileges to judge
    policies:
    - p, proj:judge:judge-dev-read-only, applications, get, judge-dev/*, allow
    groups:
    - judge-dev-read-only

  - name: judge-stage-read-only
    description: Read-only privileges to judge
    policies:
    - p, proj:judge:judge-stage-read-only, applications, get, judge-stage/*, allow
    groups:
    - judge-stage-read-only

  - name: judge-prod-read-only
    description: Read-only privileges to judge
    policies:
    - p, proj:judge:judge-prod-read-only, applications, get, judge-prod/*, allow
    groups:
    - judge-prod-read-only  


  # A role which provides editor access to all applications in the project
  - name: judge-editor
    description: editor privileges to judge
    policies:
    - p, proj:judge:judge-editor, applications, get, judge/*, allow
    - p, proj:judge:judge-editor, applications, update, judge/*, allow
    - p, proj:judge:judge-editor, applications, sync, judge/*, allow
    - p, proj:judge:judge-editor, exec, create, judge/*, allow
    - p, proj:judge:judge-editor, logs, get, judge/*, allow  
    groups:
    - judge-editor

  - name: judge-dev-editor
    description: editor privileges to judge
    policies:
    - p, proj:judge:judge-dev-editor, applications, get, judge-dev/*, allow
    - p, proj:judge:judge-dev-editor, applications, update, judge-dev/*, allow
    - p, proj:judge:judge-dev-editor, applications, sync, judge-dev/*, allow
    - p, proj:judge:judge-dev-editor, exec, create, judge-dev/*, allow   
    - p, proj:judge:judge-dev-editor, logs, get, judge-dev/*, allow  
    groups:
    - judge-dev-editor

  - name: judge-stage-editor
    description: editor privileges to judge
    policies:
    - p, proj:judge:judge-stage-editor, applications, get, judge-stage/*, allow
    - p, proj:judge:judge-stage-editor, applications, update, judge-stage/*, allow
    - p, proj:judge:judge-stage-editor, applications, sync, judge-stage/*, allow
    - p, proj:judge:judge-stage-editor, exec, create, judge-stage/*, allow    
    - p, proj:judge:judge-stage-editor, logs, get, judge-stage/*, allow  
    groups:
    - judge-stage-editor

  - name: judge-prod-editor
    description: editor privileges to judge
    policies:
    - p, proj:judge:judge-prod-editor, applications, get, judge-prod/*, allow
    - p, proj:judge:judge-prod-editor, applications, update, judge-prod/*, allow
    - p, proj:judge:judge-prod-editor, applications, sync, judge-prod/*, allow
    - p, proj:judge:judge-prod-editor, exec, create, judge-prod/*, allow  
    - p, proj:judge:judge-prod-editor, logs, get, judge-prod/*, allow  
      
    groups:
    - judge-prod-editor    


  # A role which provides admin access to all applications in the project
  - name: judge-admin
    description: admin privileges to judge
    policies:
    - p, proj:judge:judge-admin, applications, *, judge/*, allow
    - p, proj:judge:judge-admin, applications, *, judge/*, allow
    - p, proj:judge:judge-admin, exec, create, judge/*, allow
    - p, proj:judge:judge-admin, logs, get, judge/*, allow    
    - p, proj:judge:judge-admin, applications, delete, judge/*, deny
    - p, proj:judge:judge-admin, applications, create, judge/*, deny
    groups:
    - judge-admin

  - name: judge-dev-admin
    description: admin privileges to judge
    policies:
    - p, proj:judge:judge-dev-admin, applications, *, judge-dev/*, allow
    - p, proj:judge:judge-dev-admin, exec, create, judge-dev/*, allow
    - p, proj:judge:judge-dev-admin, logs, get, judge-dev/*, allow    
    - p, proj:judge:judge-dev-admin, applications, delete, judge-dev/*, deny
    - p, proj:judge:judge-dev-admin, applications, create, judge-dev/*, deny
    groups:
    - judge-dev-admin

  - name: judge-stage-admin
    description: admin privileges to judge
    policies:
    - p, proj:judge:judge-stage-admin, applications, *, judge-stage/*, allow
    - p, proj:judge:judge-stage-admin, exec, create, judge-stage/*, allow
    - p, proj:judge:judge-stage-admin, logs, get, judge-stage/*, allow    
    - p, proj:judge:judge-stage-admin, applications, delete, judge-stage/*, deny
    - p, proj:judge:judge-stage-admin, applications, create, judge-stage/*, deny
    groups:
    - judge-stage-admin  

  - name: judge-prod-admin
    description: admin privileges to judge
    policies:
    - p, proj:judge:judge-prod-admin, applications, *, judge-prod/*, allow
    - p, proj:judge:judge-prod-admin, exec, create, judge-prod/*, allow
    - p, proj:judge:judge-prod-admin, logs, get, judge-prod/*, allow    
    - p, proj:judge:judge-prod-admin, applications, delete, judge-prod/*, deny
    - p, proj:judge:judge-prod-admin, applications, create, judge-prod/*, deny
    groups:
    - judge-prod-admin





  # By default, apps may sync to any cluster specified under the `destinations` field, even if they are not
  # scoped to this project. Set the following field to `true` to restrict apps in this cluster to only clusters
  # scoped to this project.
  permitOnlyProjectScopedClusters: false

  # When using Applications-in-any-namespace, this field determines which namespaces this AppProject permits
  # Applications to reside in. Details: https://argo-cd.readthedocs.io/en/stable/operator-manual/app-any-namespace/
  sourceNamespaces:

  - "argocd-apps-*"
